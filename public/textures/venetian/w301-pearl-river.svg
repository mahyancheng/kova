<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="distress-noise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.6 0.04" numOctaves="3" seed="3" />
      <feColorMatrix values="0 0 0 0 0.55  0 0 0 0 0.5  0 0 0 0 0.45  0 0 0 0.65 0" />
    </filter>
    <filter id="scratch-noise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02 0.8" numOctaves="2" seed="11" />
      <feColorMatrix values="0 0 0 0 0.86  0 0 0 0 0.84  0 0 0 0 0.78  0 0 0 0.5 0" />
    </filter>
  </defs>
  <!-- base whitewashed wood -->
  <rect width="400" height="400" fill="#E6DFD0" />
  <!-- distress noise (the grey scratches) -->
  <rect width="400" height="400" filter="url(#distress-noise)" opacity="0.75" />
  <!-- highlight scratches (lighter brushstrokes) -->
  <rect width="400" height="400" filter="url(#scratch-noise)" opacity="0.55" />
  <!-- plank seams every ~80 px -->
  <g opacity="0.55" stroke="#9C9382">
    <line x1="0" y1="100" x2="400" y2="100" stroke-width="1.5" />
    <line x1="0" y1="200" x2="400" y2="200" stroke-width="1.5" />
    <line x1="0" y1="300" x2="400" y2="300" stroke-width="1.5" />
  </g>
  <!-- shadow under each plank seam -->
  <g opacity="0.3" stroke="#5C5648">
    <line x1="0" y1="101" x2="400" y2="101" stroke-width="0.6" />
    <line x1="0" y1="201" x2="400" y2="201" stroke-width="0.6" />
    <line x1="0" y1="301" x2="400" y2="301" stroke-width="0.6" />
  </g>
</svg>
