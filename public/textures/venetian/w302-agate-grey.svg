<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="grain-noise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.015 0.55" numOctaves="3" seed="5" />
      <feColorMatrix values="0 0 0 0 0.65  0 0 0 0 0.6  0 0 0 0 0.48  0 0 0 0.4 0" />
    </filter>
    <linearGradient id="ag-base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D6CDB6" />
      <stop offset="50%" stop-color="#C9BFA8" />
      <stop offset="100%" stop-color="#B6AC95" />
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#ag-base)" />
  <rect width="400" height="400" filter="url(#grain-noise)" opacity="0.85" />
  <!-- subtle knots / character marks -->
  <g opacity="0.32" fill="#8B7E60">
    <ellipse cx="78" cy="120" rx="22" ry="5" />
    <path d="M56 116 Q 78 124 100 118" stroke="#6E5D44" stroke-width="0.6" fill="none" opacity="0.7" />
    <ellipse cx="312" cy="280" rx="28" ry="6" />
    <path d="M284 276 Q 312 286 340 278" stroke="#6E5D44" stroke-width="0.6" fill="none" opacity="0.7" />
  </g>
  <!-- horizontal grain veining -->
  <g opacity="0.22" stroke="#74684D" fill="none">
    <path d="M0 60 Q 100 56 200 60 T 400 58" stroke-width="0.7" />
    <path d="M0 180 Q 80 184 160 180 T 320 182 T 400 180" stroke-width="0.6" />
    <path d="M0 240 Q 120 236 240 242 T 400 240" stroke-width="0.7" />
    <path d="M0 340 Q 100 344 200 340 T 400 344" stroke-width="0.6" />
  </g>
</svg>
