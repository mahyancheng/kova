<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="paper-noise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04 0.9" numOctaves="3" seed="7" />
      <feColorMatrix values="0 0 0 0 0.92  0 0 0 0 0.9  0 0 0 0 0.86  0 0 0 0.55 0" />
    </filter>
    <linearGradient id="aw-sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBF9F2" />
      <stop offset="60%" stop-color="#F4EFE6" />
      <stop offset="100%" stop-color="#E7E1D2" />
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#aw-sheen)" />
  <rect width="400" height="400" filter="url(#paper-noise)" opacity="0.5" />
  <!-- subtle horizontal wood-grain veining -->
  <g opacity="0.18" stroke="#B8AC97" fill="none" stroke-linecap="round">
    <path d="M0 80 Q 80 76 160 82 T 320 80 T 400 84" stroke-width="0.6" />
    <path d="M0 160 Q 100 156 200 162 T 360 158 T 400 162" stroke-width="0.5" />
    <path d="M0 240 Q 90 244 180 240 T 340 244 T 400 240" stroke-width="0.6" />
    <path d="M0 320 Q 120 316 240 320 T 400 320" stroke-width="0.5" />
  </g>
</svg>
